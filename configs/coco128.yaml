# COCO128 小数据集配置（Ultralytics 首次运行会自动下载到 datasets/coco128）
# 用途：快速验证训练 / 导出 / 上板全流程。真实项目请替换为你的数据集 YAML。
#
# 数据目录结构（自训练时参照）：
#   datasets/
#     mydata/
#       images/
#         train/  *.jpg
#         val/    *.jpg
#       labels/
#         train/  *.txt   (YOLO 格式：class cx cy w h，归一化)
#         val/    *.txt
